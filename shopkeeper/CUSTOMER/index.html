<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassWaale - Customer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 1. Bottom Nav Fix (Layout theek karne ke liye) */
   .bottom-nav {
    position: fixed !important;
    bottom: 0 !important;
    left: 0 !important;
    width: 100% !important;
    background: white !important;
    border-top: 1px solid #ddd !important;
    padding: 8px 0 !important;
    z-index: 99999 !important;
}

.nav-links {
    display: flex !important;
    flex-direction: row !important;
    justify-content: space-around !important; /* Ye icons ke beech gap banayega */
    align-items: center !important;
    width: 100% !important;
    max-width: 600px; /* Mobile screen ke liye best hai */
    margin: 0 auto !important;
}

.nav-item {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    text-decoration: none !important;
    color: #888 !important;
    flex: 1 !important; /* Har icon ko barabar jagah dega */
    cursor: pointer !important;
}

.nav-item.active {
    color: #1B7A45 !important;
    font-weight: bold !important;
}

.nav-icon {
    font-size: 22px !important;
    margin-bottom: 2px !important;
}

.nav-item span[data-en] {
    font-size: 11px !important;
}

    

    /* 2. Profile & Khata Section Styling */
    #profile-section { display: none; padding: 20px 0; }
    .profile-card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid #E8E6E0;
      margin-bottom: 20px;
    }
    .profile-avatar {
      font-size: 50px;
      background: #f0f0f0;
      width: 80px; height: 80px;
      line-height: 80px;
      border-radius: 50%;
      margin: 0 auto 10px;
    }
    .khata-card {
      background: #FFF3E8;
      border-left: 5px solid #ff6f00;
      padding: 15px;
      border-radius: 12px;
    }
    
    /* Language Toggle Positioning */
    .lang-toggle { position: fixed; top: 16px; right: 16px; z-index: 10000; display: flex; gap: 6px; }
    .lang-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid #E8E6E0; font-size: 12px; cursor: pointer; background: white; }
    .lang-btn.active { background: #1A1A2E; color: white; }
  </style>
</head>
<body>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('hi')" id="btn-hi">हि</button>
  </div>

  <div class="header">
    <h1 data-en="PassWaale" data-hi="पासवाले">PassWaale</h1>
    <p id="header-subtext" data-en="📍 Shops near you" data-hi="📍 पास की दुकानें">📍 Shops near you</p>
  </div>

  <div class="container" style="padding-bottom: 100px;">

    <div id="home-section">
        <p class="section-title" data-en="Nearby Shops" data-hi="पास की दुकानें">Nearby Shops</p>
        <a href="shop.html" class="card shop-card" style="text-decoration:none; color:inherit; display:block;">
            <div style="display:flex; justify-content:space-between;">
                <p style="font-weight:bold; margin:0;" data-en="Rajesh Kirana Store" data-hi="राजेश किराना स्टोर">Rajesh Kirana Store</p>
                <span style="color:green; font-size:12px;" data-en="Open" data-hi="खुला">Open</span>
            </div>
            <p style="font-size:12px; color:#888;">120m away • ⭐ 4.5</p>
        </a>
    </div>

    <div id="profile-section">
        <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <h2 data-en="Parul Nishad" data-hi="परुल निषाद">Parul Nishad</h2>
            <p style="color:#666;">+91 89577xxx</p>
        </div>

        <p class="section-title" data-en="My Account" data-hi="मेरा खाता">My Account</p>
        
        <div class="khata-card">
            <p style="margin:0; font-weight:bold;" data-en="📒 Personal Khata" data-hi="📒 मेरा खाता">📒 Personal Khata</p>
            <p style="margin:5px 0 0 0; color: #ff6f00; font-size: 22px; font-weight: 800;" data-en="Pending: ₹240" data-hi="बकाया: ₹240">Pending: ₹240</p>
        </div>
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-links">
        <div class="nav-item active" id="nav-home" onclick="showSection('home')">
            <span class="nav-icon">🏪</span>
            <span data-en="Shops" data-hi="दुकानें">Shops</span>
        </div>
        
        <a href="orders.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span data-en="Orders" data-hi="ऑर्डर">Orders</span>
        </a>
        
        <div class="nav-item" id="nav-profile" onclick="showSection('profile')">
            <span class="nav-icon">👤</span>
            <span data-en="Profile" data-hi="प्रोफ़ाइल">Profile</span>
        </div>
    </div>
</div>

  <script src="../lang.js"></script>
  <script>
    function showSection(section) {
        const home = document.getElementById('home-section');
        const profile = document.getElementById('profile-section');
        const navHome = document.getElementById('nav-home');
        const navProfile = document.getElementById('nav-profile');
        const headerSub = document.getElementById('header-subtext');

        if (section === 'profile') {
            home.style.display = 'none';
            profile.style.display = 'block';
            navHome.classList.remove('active');
            navProfile.classList.add('active');
            headerSub.innerText = "My Account";
        } else {
            home.style.display = 'block';
            profile.style.display = 'none';
            navHome.classList.add('active');
            navProfile.classList.remove('active');
            headerSub.innerText = "📍 Shops near you";
        }
        
        // Language sync
        if(typeof setLang === 'function') {
            let currentLang = document.getElementById('btn-hi').classList.contains('active') ? 'hi' : 'en';
            setLang(currentLang);
        }
    }
  </script>
</body>
</html>
